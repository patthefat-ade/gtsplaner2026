name: CI – Test & Lint

on:
  push:
    branches:
      - "**"
      - "!main"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_gtsplaner
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_gtsplaner"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_gtsplaner
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --tb=short -q
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_gtsplaner
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"

  frontend-test:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
