name: gtsplaner2026
region: fra # Frankfurt

# ---------------------------------------------------------------------------
# Services (Backend, Frontend, Worker)
# ---------------------------------------------------------------------------
services:
  # Django Backend
  - name: backend
    git:
      repo_url: https://github.com/patthefat-ade/gtsplaner2026.git
      branch: main
      deploy_on_push: false  # Deployment nur über GitHub Actions CD
    dockerfile_path: backend/Dockerfile
    envs:
      # --- Sicherheit ---
      - key: SECRET_KEY
        scope: RUN_TIME
        value: ${SECRET_KEY}
      - key: SALT_KEY
        scope: RUN_TIME
        value: ${SALT_KEY}
      - key: DEBUG
        scope: RUN_TIME
        value: "False"
      - key: ALLOWED_HOSTS
        scope: RUN_TIME
        value: ${APP_URL}
      # --- Datenbank & Cache ---
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: VALKEY_URL
        scope: RUN_TIME
        value: ${redis.INTERNAL_URL}
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        value: ${redis.INTERNAL_URL}
      # --- E-Mail (SMTP) ---
      - key: EMAIL_HOST
        scope: RUN_TIME
        value: mail.your-server.de
      - key: EMAIL_PORT
        scope: RUN_TIME
        value: "587"
      - key: EMAIL_USE_TLS
        scope: RUN_TIME
        value: "True"
      - key: EMAIL_HOST_USER
        scope: RUN_TIME
        value: auto_benachrichtigungen@gtsplaner.app
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_TIME
        value: ${EMAIL_HOST_PASSWORD}
      - key: DEFAULT_FROM_EMAIL
        scope: RUN_TIME
        value: "GTS Planer <auto_benachrichtigungen@gtsplaner.app>"
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://www.gtsplaner.app
      # --- CORS ---
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${frontend.URL}
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8000
    routes:
      - path: /api
    health_check:
      http_path: /api/health-check/

  # Next.js Frontend
  - name: frontend
    git:
      repo_url: https://github.com/patthefat-ade/gtsplaner2026.git
      branch: main
      deploy_on_push: false  # Deployment nur über GitHub Actions CD
    dockerfile_path: frontend/Dockerfile
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${backend.URL}/api
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /

# ---------------------------------------------------------------------------
# Worker (Celery)
# ---------------------------------------------------------------------------
workers:
  - name: celery-worker
    git:
      repo_url: https://github.com/patthefat-ade/gtsplaner2026.git
      branch: main
      deploy_on_push: false  # Deployment nur über GitHub Actions CD
    dockerfile_path: backend/Dockerfile
    envs:
      - key: SECRET_KEY
        scope: RUN_TIME
        value: ${SECRET_KEY}
      - key: SALT_KEY
        scope: RUN_TIME
        value: ${SALT_KEY}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        value: ${redis.INTERNAL_URL}
      # --- E-Mail (SMTP) – Worker braucht dieselbe Konfiguration ---
      - key: EMAIL_HOST
        scope: RUN_TIME
        value: mail.your-server.de
      - key: EMAIL_PORT
        scope: RUN_TIME
        value: "587"
      - key: EMAIL_USE_TLS
        scope: RUN_TIME
        value: "True"
      - key: EMAIL_HOST_USER
        scope: RUN_TIME
        value: auto_benachrichtigungen@gtsplaner.app
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_TIME
        value: ${EMAIL_HOST_PASSWORD}
      - key: DEFAULT_FROM_EMAIL
        scope: RUN_TIME
        value: "GTS Planer <auto_benachrichtigungen@gtsplaner.app>"
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://www.gtsplaner.app
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: celery -A config worker -l info

# ---------------------------------------------------------------------------
# Datenbanken (PostgreSQL, Redis/Valkey)
# ---------------------------------------------------------------------------
databases:
  # Managed PostgreSQL
  - name: db
    engine: PG # PostgreSQL
    version: "16"
    production: true
    instance_size_slug: db-s-1vcpu-1gb

  # Managed Redis (genutzt als Valkey-kompatibel für Cache + Celery Broker)
  - name: redis
    engine: REDIS
    version: "7"
    production: true
    instance_size_slug: db-s-1vcpu-1gb
