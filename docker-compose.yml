version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: kassenbuch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kassenbuch
      POSTGRES_USER: kassenbuch_user
      POSTGRES_PASSWORD: kassenbuch_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kassenbuch_user -d kassenbuch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Celery Broker + Cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kassenbuch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kassenbuch-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: kassenbuch
      DB_USER: kassenbuch_user
      DB_PASSWORD: kassenbuch_secret_2026
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kassenbuch-celery
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: kassenbuch
      DB_USER: kassenbuch_user
      DB_PASSWORD: kassenbuch_secret_2026
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kassenbuch-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_static:
  backend_media:
