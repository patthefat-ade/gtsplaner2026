openapi: 3.0.3
info:
  title: GTS Planer API
  version: 2.4.0
  description: REST API für den GTS Planer – Verwaltung von Ganztagsschul-Gruppen,
    Wochenplänen, Finanzen und Zeiterfassung. Django + Next.js Headless Architecture.
paths:
  /api/health/:
    get:
      operationId: api_health_retrieve
      description: Prueft ob die API erreichbar und funktionsfaehig ist.
      summary: Health Check
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
          description: ''
  /api/v1/admin/audit-logs/:
    get:
      operationId: admin_audit_logs_list
      description: Read-only access to audit log entries (Admin/SuperAdmin only).
      summary: Audit-Log auflisten
      parameters:
      - in: query
        name: action
        schema:
          type: string
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: model_name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: user_id
        schema:
          type: number
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
  /api/v1/admin/audit-logs/{id}/:
    get:
      operationId: admin_audit_logs_retrieve
      description: Read-only access to audit log entries (Admin/SuperAdmin only).
      summary: Audit-Log-Eintrag abrufen
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Audit-Log identifiziert.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/v1/admin/gdpr/anonymize-student/{student_id}/:
    post:
      operationId: admin_gdpr_anonymize_student_create
      description: Pseudoanonymisiert die personenbezogenen Daten eines Schuelers/einer
        Schuelerin (DSGVO Art. 17).
      summary: Schueler:in anonymisieren
      parameters:
      - in: path
        name: student_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymizeStudentResponse'
          description: ''
  /api/v1/admin/gdpr/anonymize-user/{user_id}/:
    post:
      operationId: admin_gdpr_anonymize_user_create
      description: Pseudoanonymisiert die personenbezogenen Daten eines Benutzers
        (DSGVO Art. 17).
      summary: Benutzer anonymisieren
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymizeUserResponse'
          description: ''
  /api/v1/admin/gdpr/export-student/{student_id}/:
    get:
      operationId: admin_gdpr_export_student_retrieve
      description: Exportiert alle Daten eines Schuelers/einer Schuelerin als ZIP-Datei
        (DSGVO Art. 15 Auskunftsrecht).
      summary: Schuelerdaten exportieren
      parameters:
      - in: path
        name: student_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/zip:
              schema:
                type: string
                format: binary
          description: ''
  /api/v1/admin/gdpr/export-user/{user_id}/:
    get:
      operationId: admin_gdpr_export_user_retrieve
      description: Exportiert alle Daten eines Benutzers als ZIP-Datei (DSGVO Art.
        15 Auskunftsrecht).
      summary: Benutzerdaten exportieren
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/zip:
              schema:
                type: string
                format: binary
          description: ''
  /api/v1/admin/gdpr/retention-config/:
    get:
      operationId: admin_gdpr_retention_config_retrieve
      description: Liefert die aktuelle DSGVO-Aufbewahrungsfrist-Konfiguration.
      summary: Aufbewahrungskonfiguration abrufen
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDPRRetentionConfigResponse'
          description: ''
    put:
      operationId: admin_gdpr_retention_config_update
      description: Aktualisiert die DSGVO-Aufbewahrungsfrist in Jahren (1-30).
      summary: Aufbewahrungskonfiguration aktualisieren
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GDPRRetentionConfigUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GDPRRetentionConfigUpdateRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GDPRRetentionConfigUpdateRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDPRRetentionConfigUpdateResponse'
          description: ''
  /api/v1/admin/gdpr/stats/:
    get:
      operationId: admin_gdpr_stats_retrieve
      description: Liefert Statistiken zu Datenaufbewahrung und Anonymisierung.
      summary: DSGVO-Statistiken abrufen
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GDPRRetentionStatsResponse'
          description: ''
  /api/v1/admin/organizations/:
    get:
      operationId: admin_organizations_list
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisationen auflisten
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationList'
          description: ''
    post:
      operationId: admin_organizations_create
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisation erstellen
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
  /api/v1/admin/organizations/{id}/:
    get:
      operationId: admin_organizations_retrieve
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisation abrufen
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Organisation identifiziert.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    put:
      operationId: admin_organizations_update
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisation aktualisieren
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Organisation identifiziert.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    patch:
      operationId: admin_organizations_partial_update
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisation teilweise aktualisieren
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Organisation identifiziert.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrganizationRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
    delete:
      operationId: admin_organizations_destroy
      description: |-
        CRUD for organizations.

        - Admin: read-only access (list, retrieve) filtered by tenant
        - SuperAdmin: full CRUD access across all organizations
      summary: Organisation loeschen
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Organisation identifiziert.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/admin/settings/:
    get:
      operationId: admin_settings_list
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellungen auflisten
      parameters:
      - name: ordering
        required: false
        in: query
        description: Feld, das zum Sortieren der Ergebnisse verwendet werden soll.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Eine Seitenzahl in der paginierten Ergebnismenge.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Ein Suchbegriff.
        schema:
          type: string
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSystemSettingList'
          description: ''
    post:
      operationId: admin_settings_create
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellung erstellen
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
          description: ''
  /api/v1/admin/settings/{id}/:
    get:
      operationId: admin_settings_retrieve
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellung abrufen
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Systemeinstellung identifiziert.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
          description: ''
    put:
      operationId: admin_settings_update
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellung aktualisieren
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Systemeinstellung identifiziert.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SystemSettingRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
          description: ''
    patch:
      operationId: admin_settings_partial_update
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellung teilweise aktualisieren
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Systemeinstellung identifiziert.
        required: true
      tags:
      - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSystemSettingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSystemSettingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSystemSettingRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
          description: ''
    delete:
      operationId: admin_settings_destroy
      description: CRUD for system settings (SuperAdmin only for write, Admin for
        read).
      summary: Systemeinstellung loeschen
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Ein eindeutiger Ganzzahl-Wert, der Systemeinstellung identifiziert.
        required: true
      tags:
      - Admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/2fa/disable/:
    post:
      operationId: auth_2fa_disable_create
      description: Deaktiviert 2FA für den Benutzer. Erfordert den aktuellen TOTP-Code.
      summary: 2FA deaktivieren
      tags:
      - Auth – 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: 2FA erfolgreich deaktiviert
        '400':
          description: Ungültiger Code
  /api/v1/auth/2fa/login-verify/:
    post:
      operationId: auth_2fa_login_verify_create
      description: Verifiziert den TOTP-Code während des Login-Prozesses und gibt
        JWT-Tokens zurück.
      summary: 2FA Login-Verifizierung
      tags:
      - Auth – 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Login erfolgreich mit 2FA
        '400':
          description: Ungültiger Code
  /api/v1/auth/2fa/setup/:
    post:
      operationId: auth_2fa_setup_create
      description: Generiert ein TOTP-Secret und QR-Code. Der Benutzer muss den Code
        verifizieren, um 2FA zu aktivieren.
      summary: 2FA einrichten
      tags:
      - Auth – 2FA
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetup'
          description: ''
  /api/v1/auth/2fa/status/:
    get:
      operationId: auth_2fa_status_retrieve
      description: Gibt den 2FA-Status des angemeldeten Benutzers zurück.
      summary: 2FA Status abrufen
      tags:
      - Auth – 2FA
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: 2FA Status
  /api/v1/auth/2fa/verify/:
    post:
      operationId: auth_2fa_verify_create
      description: Verifiziert den TOTP-Code und aktiviert 2FA für den Benutzer.
      summary: 2FA verifizieren und aktivieren
      tags:
      - Auth – 2FA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: 2FA erfolgreich aktiviert
        '400':
          description: Ungültiger Code
  /api/v1/auth/accept-terms/:
    post:
      operationId: auth_accept_terms_create
      description: Markiert den Benutzer als einverstanden mit Datenschutz und Nutzungsbedingungen.
      summary: Datenschutz & Nutzungsbedingungen akzeptieren
      tags:
      - Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Bedingungen akzeptiert
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Authentifizierung mit Benutzername/E-Mail und Passwort. Gibt JWT-Tokens
        zurück.
      summary: Benutzer anmelden
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Login erfolgreich
        '400':
          description: Ungültige Anmeldedaten
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Blacklistet den Refresh Token und meldet den Benutzer ab.
      summary: Benutzer abmelden
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Logout erfolgreich
        '400':
          description: Ungültiger Token
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Gibt die Profildaten des angemeldeten Benutzers zurück, inklusive
        Berechtigungen und Tenant-Kontext.
      summary: Eigenes Profil abrufen
      tags:
      - Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Aktualisiert die Profildaten des angemeldeten Benutzers.
      summary: Eigenes Profil aktualisieren
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/password-change/:
    post:
      operationId: auth_password_change_create
      description: Ändert das Passwort des angemeldeten Benutzers.
      summary: Passwort ändern
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Passwort erfolgreich geändert
        '400':
          description: Ungültiges Passwort
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: Sendet eine E-Mail mit einem Link zum Zurücksetzen des Passworts.
      summary: Passwort-Reset anfordern
      tags:
      - Auth
      requestBody:
        content:
