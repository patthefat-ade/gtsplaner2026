components:
  schemas:
    ActionEnum:
      enum:
      - create
      - update
      - delete
      - login
      - logout
      - approve
      - reject
      type: string
      description: |-
        * `create` - Erstellt
        * `update` - Aktualisiert
        * `delete` - Geloescht
        * `login` - Anmeldung
        * `logout` - Abmeldung
        * `approve` - Genehmigt
        * `reject` - Abgelehnt
    AdminUserCompact:
      type: object
      description: Compact user representation for admin panel.
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
      required:
      - first_name
      - id
      - last_name
    AnonymizeStudentResponse:
      type: object
      properties:
        status:
          type: string
        anonymized_fields:
          type: array
          items:
            type: string
      required:
      - anonymized_fields
      - status
    AnonymizeUserResponse:
      type: object
      properties:
        status:
          type: string
        anonymized_fields:
          type: array
          items:
            type: string
      required:
      - anonymized_fields
      - status
    Attendance:
      type: object
      description: Full attendance record serializer.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
          title: Schüler:in
        group:
          type: integer
          title: Gruppe
        date:
          type: string
          format: date
          title: Datum
        status:
          $ref: '#/components/schemas/AttendanceStatusEnum'
        status_display:
          type: string
          readOnly: true
        notes:
          type: string
          title: Notizen
        recorded_by:
          type: integer
          readOnly: true
          nullable: true
          title: Erfasst von
        recorded_by_name:
          type: string
          nullable: true
          readOnly: true
        student_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - group
      - id
      - recorded_by
      - recorded_by_name
      - status_display
      - student
      - student_name
      - updated_at
    AttendanceCreate:
      type: object
      description: Serializer for creating a single attendance record.
      properties:
        student:
          type: integer
          title: Schüler:in
        group:
          type: integer
          title: Gruppe
        date:
          type: string
          format: date
          title: Datum
        status:
          $ref: '#/components/schemas/AttendanceStatusEnum'
        notes:
          type: string
          title: Notizen
      required:
      - date
      - group
      - student
    AttendanceCreateRequest:
      type: object
